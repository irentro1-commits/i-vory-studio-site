<style id="mobile-perf-patch">
@media (max-width: 900px), (pointer: coarse) {
  /* KILL backdrop-filter only (the #1 scroll lag cause) */
  *, *::before, *::after {

  /* Solid bg on fixed elements */

  /* HIDE hero video on mobile (empty black rectangle killer) */
  .hero-video, #heroVideo, #hvVid, .hv-play, #hvPlay {
    display: none !important;

  /* Hide section s2 that only contained the hero video */
  section.s2 .hero-video { display: none !important; }

  /* Reduce huge box-shadow blur to 15px max */
  .pk, .type-card, .proof-card, .faq-item, .contact-alt,
  .card, .testim, button, .nc, .dock__chip.is-active {

  /* Hide meteor cursor (irrelevant on touch) */
  #meteor-cursor, #meteor-flame, #meteor-flame2, #meteor-flame3,
  .meteor-cursor, [id^="meteor"], [class^="meteor"] {
    display: none !important;

  /* Reduce transitions (snappy response) */

}

<script id="mobile-perf-js">
/* Block ONLY meteor-cursor + premium-fx on mobile, nothing else */
(function(){
  var isMobile = window.matchMedia('(pointer: coarse)').matches || window.innerWidth <= 900;
  if (!isMobile) return;
  window.MOBILE_DEVICE = true;
  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('[id^="meteor"], [class^="meteor"]').forEach(function(el){el.remove();});

    var hv = document.getElementById('heroVideo') || document.querySelector('.hero-video');
    if (hv) hv.remove();
    var hvVid = document.getElementById('hvVid');
    if (hvVid) { hvVid.pause(); hvVid.remove(); }
  });
})();

<script id="nav-auto-hide">
(function(){
  var nav=document.getElementById('nav')||document.querySelector('nav');
  if(!nav)return;
  var lastY=window.scrollY;
  var ticking=false;
  function update(){
    var cur=window.scrollY;
    if(cur<20){
      nav.classList.remove('nav-hidden');
      document.body.classList.remove('nav-hidden');
    } else if(cur>lastY+4){
      nav.classList.add('nav-hidden');
      document.body.classList.add('nav-hidden');
    } else if(cur<lastY-4){
      nav.classList.remove('nav-hidden');
      document.body.classList.remove('nav-hidden');
    }
    lastY=cur;
    ticking=false;
  }
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(update);ticking=true;}
  },{passive:true});
})();
</script>
